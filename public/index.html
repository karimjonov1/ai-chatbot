<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #05060f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .orb1 {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(111,76,255,0.18) 0%, transparent 70%);
      top: -200px; left: -180px; pointer-events: none;
    }
    .orb2 {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(34,100,255,0.15) 0%, transparent 70%);
      bottom: -180px; right: -120px; pointer-events: none;
    }
    .orb3 {
      position: fixed; width: 250px; height: 250px; border-radius: 50%;
      background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, transparent 70%);
      bottom: 120px; left: 60px; pointer-events: none;
    }

    .chat-box {
      width: 100%;
      max-width: 680px;
      height: 100vh;
      max-height: 760px;
      background: rgba(12, 14, 28, 0.85);
      backdrop-filter: blur(30px);
      border-radius: 24px;
      border: 1px solid rgba(120, 90, 255, 0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 60px rgba(111,76,255,0.08), 0 0 0 1px rgba(255,255,255,0.04);
      margin: 20px;
    }

    .chat-head {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(111,76,255,0.06);
      flex-shrink: 0;
    }
    .bot-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #6f4cff, #2264ff);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px rgba(111,76,255,0.5);
      flex-shrink: 0;
    }
    .head-text h2 { font-size: 15px; font-weight: 600; color: #e8e2ff; letter-spacing: 0.3px; }
    .head-text p  { font-size: 11px; color: #5a5480; margin-top: 1px; }
    .badge {
      margin-left: auto;
      background: rgba(111,76,255,0.15);
      border: 1px solid rgba(111,76,255,0.3);
      color: #a98fff; font-size: 10px;
      padding: 4px 10px; border-radius: 20px; letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .chat-msgs {
      flex: 1; overflow-y: auto;
      padding: 20px 20px 10px;
      display: flex; flex-direction: column; gap: 16px;
      scrollbar-width: thin; scrollbar-color: #1e1a38 transparent;
    }
    .chat-msgs::-webkit-scrollbar { width: 4px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: #1e1a38; border-radius: 4px; }

    .msg-row { display: flex; gap: 10px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }

    .mini-av {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 13px;
    }
    .ai-av   { background: linear-gradient(135deg,#6f4cff,#2264ff); box-shadow: 0 0 10px rgba(111,76,255,0.4); }
    .user-av { background: linear-gradient(135deg,#ec4899,#f43f5e); box-shadow: 0 0 10px rgba(236,72,153,0.4); }

    .bubble {
      max-width: 72%; padding: 12px 16px;
      border-radius: 18px; font-size: 13.5px; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
    }
    .ai-bubble {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(120,90,255,0.15);
      color: #ccc5ee; border-bottom-left-radius: 4px;
    }
    .user-bubble {
      background: linear-gradient(135deg, rgba(111,76,255,0.75), rgba(34,100,255,0.65));
      border: 1px solid rgba(111,76,255,0.35);
      color: #ede8ff; border-bottom-right-radius: 4px;
    }
    .error-bubble {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5; border-bottom-left-radius: 4px;
    }
    .bubble-time { font-size: 10px; color: #3d3860; margin-top: 5px; }
    .user .bubble-time { text-align: right; }

    .typing-dots {
      display: flex; gap: 5px; padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(120,90,255,0.15);
      border-radius: 18px; border-bottom-left-radius: 4px;
    }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%; background: #6f4cff;
      animation: pulse 1.3s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%,80%,100% { opacity: 0.2; transform: scale(0.75); }
      40%          { opacity: 1;   transform: scale(1); }
    }

    .chat-foot {
      padding: 16px 20px 18px;
      border-top: 1px solid rgba(255,255,255,0.04);
      background: rgba(8,10,22,0.6);
      flex-shrink: 0;
    }
    .pill-input {
      display: flex; align-items: center;
      background: rgba(111,76,255,0.08);
      border: 1px solid rgba(111,76,255,0.3);
      border-radius: 999px;
      padding: 6px 6px 6px 20px; gap: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .pill-input:focus-within {
      border-color: rgba(111,76,255,0.65);
      box-shadow: 0 0 0 3px rgba(111,76,255,0.12), 0 0 20px rgba(111,76,255,0.1);
    }
    .pill-input textarea {
      flex: 1; background: transparent; border: none;
      color: #d4cfff; font-size: 13.5px;
      resize: none; outline: none;
      font-family: 'Inter', sans-serif;
      padding: 8px 0; line-height: 1.5;
    }
    .pill-input textarea::placeholder { color: #6b5fa8; }
    .pill-send {
      width: 46px; height: 46px; border-radius: 50%;
      background: linear-gradient(135deg, #6f4cff, #2264ff);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 22px rgba(111,76,255,0.55);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .pill-send:hover  { transform: scale(1.08); box-shadow: 0 0 32px rgba(111,76,255,0.75); }
    .pill-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .pill-send svg { width: 18px; height: 18px; fill: white; margin-left: 2px; }
    .hint { font-size: 11px; color: #2a2550; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>

  <div class="chat-box">
    <div class="chat-head">
      <div class="bot-avatar">🤖</div>
      <div class="head-text">
        <h2>AI Assistant</h2>
        <p>Groq · llama-3.3-70b-versatile</p>
      </div>
      <div class="badge">● Online</div>
    </div>

    <div class="chat-msgs" id="messages">
      <div class="msg-row">
        <div class="mini-av ai-av">🤖</div>
        <div>
          <div class="bubble ai-bubble">Salom! Men sizning shaxsiy AI yordamchingizman. Har qanday savol yoki vazifa bilan yordam beraman! 🚀</div>
          <div class="bubble-time">Hozir</div>
        </div>
      </div>
    </div>

    <div class="chat-foot">
      <div class="pill-input">
        <textarea id="userInput" rows="1" placeholder="Xabaringizni yozing..."></textarea>
        <button class="pill-send" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="hint">Enter — yuborish &nbsp;·&nbsp; Shift+Enter — yangi qator</div>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    function getTime() {
      const now = new Date();
      return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    }

    function addMessage(text, type) {
      const row = document.createElement('div');
      row.classList.add('msg-row');

      let avatarClass, avatarEmoji, bubbleClass;
      if (type === 'user') {
        row.classList.add('user');
        avatarClass = 'user-av'; avatarEmoji = '👤'; bubbleClass = 'user-bubble';
      } else if (type === 'error') {
        avatarClass = 'ai-av'; avatarEmoji = '🤖'; bubbleClass = 'error-bubble';
      } else {
        avatarClass = 'ai-av'; avatarEmoji = '🤖'; bubbleClass = 'ai-bubble';
      }

      row.innerHTML = `
        <div class="mini-av ${avatarClass}">${avatarEmoji}</div>
        <div>
          <div class="bubble ${bubbleClass}">${text}</div>
          <div class="bubble-time">${getTime()}</div>
        </div>`;

      messagesDiv.appendChild(row);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addTyping() {
      const row = document.createElement('div');
      row.classList.add('msg-row');
      row.id = 'typing-indicator';
      row.innerHTML = `
        <div class="mini-av ai-av">🤖</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>`;
      messagesDiv.appendChild(row);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      input.value = '';
      input.style.height = 'auto';
      btn.disabled = true;
      addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        removeTyping();

        if (!res.ok) {
          addMessage('Xatolik: ' + data.error, 'error');
        } else {
          addMessage(data.reply, 'ai');
        }
      } catch (err) {
        removeTyping();
        addMessage("Server bilan bog'lanishda xatolik yuz berdi.", 'error');
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
